name: Release Asset Check

"on":
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (bijv. v1.5.9)"
        required: true
        type: string

jobs:
  validate-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate required assets
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          json="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$api")"

          echo "Controleer release assets voor $REPO@$TAG"

          python3 - <<'PY' "$json"
          import json
          import sys

          release = json.loads(sys.argv[1])
          assets = [a.get('name', '') for a in release.get('assets', [])]
          missing = []
          if 'latest-mac.yml' not in assets:
              missing.append('latest-mac.yml')
          if not any(name.endswith('-arm64-mac.zip') for name in assets):
              missing.append('*-arm64-mac.zip')
          if not any(name.endswith('-arm64.dmg') for name in assets):
              missing.append('*-arm64.dmg')
          if not any(name.endswith('-x64-mac.zip') for name in assets):
              missing.append('*-x64-mac.zip')
          if not any(name.endswith('-x64.dmg') for name in assets):
              missing.append('*-x64.dmg')

          if missing:
              print('Ontbrekende verplichte assets:', ', '.join(missing))
              print('Aanwezige assets:')
              for name in assets:
                  print(' -', name)
              sys.exit(1)

          print('OK: verplichte mac-assets aanwezig.')
          PY

